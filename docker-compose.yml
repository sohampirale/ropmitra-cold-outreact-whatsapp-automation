services:
  ropmitra-automation:
    build: .
    container_name: ropmitra-automation
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/automation.db
      # Set this to the URL of your remote Evolution API VPS container (e.g. http://1.2.3.4:8080 or https://evo.yourdomain.com)
      - EVOLUTION_API_URL=${EVOLUTION_API_URL:-http://localhost:8080}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-your_evolution_api_global_key_here}
      - MOCK_EVOLUTION_API=${MOCK_EVOLUTION_API:-false}
      - DEFAULT_SEND_INTERVAL_SECONDS=${DEFAULT_SEND_INTERVAL_SECONDS:-300}
    volumes:
      - ./data:/app/data

