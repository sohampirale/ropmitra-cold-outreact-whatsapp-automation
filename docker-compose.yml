version: '3.8'

services:
  ropmitra-automation:
    build: .
    container_name: ropmitra-automation
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/automation.db
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=evolution_global_secret
      - MOCK_EVOLUTION_API=false
      - DEFAULT_SEND_INTERVAL_SECONDS=300
    volumes:
      - ./data:/app/data

  evolution-api:
    image: atendai/evolution-api:v2.1.1
    container_name: evolution-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=evolution_global_secret
      - LOG_LEVEL=INFO
    volumes:
      - ./evolution_instances:/evolution/instances
