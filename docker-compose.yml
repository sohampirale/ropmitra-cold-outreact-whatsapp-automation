services:
  ropmitra-automation:
    build: .
    container_name: ropmitra-automation
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/automation.db
      - EVOLUTION_API_URL=http://evolution-api:8080
      - EVOLUTION_API_KEY=evolution_global_secret
      - MOCK_EVOLUTION_API=false
      - DEFAULT_SEND_INTERVAL_SECONDS=300
    volumes:
      - ./data:/app/data

  evolution-postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution
      - POSTGRES_DB=evolution
    volumes:
      - evolution_pgdata:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: always
    depends_on:
      - evolution-postgres
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=evolution_global_secret
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution@evolution-postgres:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - LOG_LEVEL=INFO
    volumes:
      - ./evolution_instances:/evolution/instances

volumes:
  evolution_pgdata:
